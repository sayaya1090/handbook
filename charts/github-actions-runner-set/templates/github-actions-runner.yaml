apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: handbook{{- if .Values.mode }}-{{ .Values.mode }}{{- end }}-github-actions-runnerset
  namespace: openshift-gitops
spec:
  generators:
  - list:
      elements:
      - prefix: handbook
        cache: handbook-runner-cache
        runner: handbook-actions-runner
  template:
    metadata:
      name: '{{`{{ prefix }}`}}-github-actions-runner'
    spec:
      ignoreDifferences:
        - group: actions.github.com
          kind: AutoscalingListener
          jsonPointers: []
        - group: rbac.authorization.k8s.io
          kind: Role
          jsonPointers: []
        - group: rbac.authorization.k8s.io
          kind: RoleBinding
          jsonPointers: []
      destination:
        namespace: {{ .Release.Namespace }}
        server: 'https://kubernetes.default.svc'
      project: handbook
      source:
        path: charts/github-actions-runner
        repoURL: 'https://github.com/sayaya1090/handbook.git'
        targetRevision: {{ .Values.revision }}
        helm:
          values: |
            ubi9:
              runnerScaleSetName: '{{`{{ prefix }}`}}'
              githubConfigUrl: https://github.com/sayaya1090/handbook
              githubConfigSecret: github-secret
              minRunners: 1
              maxRunners: 1
              template:
                spec:
                  initContainers:
                    - name: init-dind-externals
                      image: image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/{{`{{ runner }}`}}:latest
                      command: [ "cp", "-r", "-v", "/home/runner/externals/.", "/home/runner/tmpDir/" ]
                      volumeMounts:
                        - name: dind-externals
                          mountPath: /home/runner/tmpDir
                  containers:
                    - name: runner
                      image: image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/{{`{{ runner }}`}}:latest
                      command: [ "/home/runner/run.sh" ]
                      securityContext:
                        runAsUser: 1000
                        privileged: true
                      resources:
                        requests:
                          cpu: "1"
                          memory: 500Mi
                      env:
                        - name: DOCKER_HOST
                          value: unix:///var/run/docker.sock
                      volumeMounts:
                        - name: cache
                          subPath: _work
                          mountPath: /home/runner/_work
                        - name: cache
                          subPath: .gradle
                          mountPath: /home/runner/.gradle
                        - name: cache
                          subPath: gradle-installations/installs
                          mountPath: /home/runner/gradle-installations/installs
                        - name: dind-sock
                          mountPath: /var/run
                        - name: cache
                          mountPath: /home/runner/cache
                    - name: dind
                      image: image-registry.openshift-image-registry.svc:5000/github-actions-runner/docker:dind
                      args: [ "dockerd", "--host=unix:///var/run/docker.sock", "--group=$(DOCKER_GROUP_GID)" ]
                      env:
                        - name: DOCKER_GROUP_GID
                          value: "123"
                      securityContext:
                        privileged: true
                      volumeMounts:
                        - name: cache
                          subPath: _work
                          mountPath: /home/runner/_work
                        - name: cache
                          subPath: fuse-overlayfs
                          mountPath: /var/lib/docker/fuse-overlayfs
                        - mountPath: /var/lib/docker/image
                          name: cache
                          subPath: image
                        - name: dind-sock
                          mountPath: /var/run
                        - name: dind-externals
                          mountPath: /home/runner/externals
                        - name: daemon-json
                          mountPath: /etc/docker/daemon.json
                          subPath: daemon.json
                          readOnly: true
                  volumes:
                    - name: dind-sock
                      emptyDir: { }
                    - name: dind-externals
                      emptyDir: { }
                    - name: daemon-json
                      configMap:
                        name: docker-daemon-config
                    - name: cache
                      persistentVolumeClaim:
                        claimName: {{`{{ cache }}`}}
                  serviceAccountName: arc
              controllerServiceAccount:
                namespace: github-actions-runner
                name: arc

      revisionHistoryLimit: 0
      syncPolicy:
        syncOptions:
          - RespectIgnoreDifferences=true
          - CreateNamespace=true
          - ServerSideApply=true