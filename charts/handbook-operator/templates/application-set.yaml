apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: handbook
  namespace: openshift-gitops
spec:
  generators:
    - list:
        elements:
          - bucket: handbook-test
            database: 192.168.1.211
            host: handbook.sayaya.cloud
            mode: test
            name: handbook-test
            stage: test
          - bucket: handbook
            database: 192.168.1.210
            host: handbook.sayaya.dev
            mode: ''
            name: handbook
            stage: prod
  template:
    metadata:
      annotations:
        kargo.akuity.io/authorized-stage: 'handbook:persist-{{stage}}'
      name: '{{name}}'
    spec:
      destination:
        namespace: '{{name}}'
        server: 'https://kubernetes.default.svc'
      project: handbook
      sources:
        - helm:
            parameters:
              - name: host
                value: '{{host}}'
              - name: mode
                value: '{{mode}}'
              - name: bucket.name
                value: '{{bucket}}'
              - name: database.ip
                value: '{{database}}'
              - forceString: true
                name: persist.image.name
                value: 'image-registry.openshift-image-registry.svc:5000/handbook/persist'
              - forceString: true
                name: search-type.image.name
                value: 'image-registry.openshift-image-registry.svc:5000/handbook/search-type'
          path: charts/handbook
          repoURL: 'https://github.com/sayaya1090/handbook.git'
          targetRevision: HEAD
      syncPolicy:
        syncOptions:
          - CreateNamespace=true