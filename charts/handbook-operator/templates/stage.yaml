apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: handbook-test
  namespace: {{ .Release.Namespace }}
  annotations:
     kargo.akuity.io/color: amber
spec:
  promotionTemplate:
    spec:
      steps:
        - config:
            apps:
              - name: handbook-test
                sources:
                  - helm:
                      images:
                        - key: persist.image.tag
                          value: {{`${{ imageFrom("image-registry.openshift-image-registry.svc:5000/`}}{{ .Release.Namespace }}{{`/persist", warehouse("persist")).Tag }}@${{ imageFrom("image-registry.openshift-image-registry.svc:5000/`}}{{ .Release.Namespace }}{{`/persist", warehouse("persist")).Digest }}`}}
                        - key: search-type.image.tag
                          value: {{`${{ imageFrom("image-registry.openshift-image-registry.svc:5000/`}}{{ .Release.Namespace }}{{`/search-type", warehouse("search-type")).Tag }}@${{ imageFrom("image-registry.openshift-image-registry.svc:5000/`}}{{ .Release.Namespace }}{{`/search-type", warehouse("search-type")).Digest }}`}}
                    repoURL: 'https://github.com/sayaya1090/handbook.git'
          uses: argocd-update
  requestedFreight:
    - origin:
        kind: Warehouse
        name: persist
      sources:
        direct: true
    - origin:
        kind: Warehouse
        name: search-type
      sources:
        direct: true
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: handbook-prod
  namespace: {{ .Release.Namespace }}
  annotations:
     kargo.akuity.io/color: green
spec:
  promotionTemplate:
    spec:
      steps:
        - config:
            apps:
              - name: handbook
                sources:
                  - helm:
                      images:
                        - key: persist.image.tag
                          value: {{`${{ imageFrom("image-registry.openshift-image-registry.svc:5000/`}}{{ .Release.Namespace }}{{`/persist", warehouse("persist")).Tag }}@${{ imageFrom("image-registry.openshift-image-registry.svc:5000/`}}{{ .Release.Namespace }}{{`/persist", warehouse("persist")).Digest }}`}}
                        - key: search-type.image.tag
                          value: {{`${{ imageFrom("image-registry.openshift-image-registry.svc:5000/`}}{{ .Release.Namespace }}{{`/search-type", warehouse("search-type")).Tag }}@${{ imageFrom("image-registry.openshift-image-registry.svc:5000/`}}{{ .Release.Namespace }}{{`/search-type", warehouse("search-type")).Digest }}`}}
                    repoURL: 'https://github.com/sayaya1090/handbook.git'
          uses: argocd-update
  requestedFreight:
    - origin:
        kind: Warehouse
        name: persist
      sources:
        direct: false
        stages:
          - handbook-test
    - origin:
        kind: Warehouse
        name: search-type
      sources:
        direct: false
        stages:
          - handbook-test