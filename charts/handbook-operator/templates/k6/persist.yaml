kind: ConfigMap
apiVersion: v1
metadata:
  name: persist-test
  namespace: {{ .Release.Namespace }}
immutable: false
data:
  test.js: |-
    import http from 'k6/http';
    import { sleep, check } from 'k6';

    export const options = {
        scenarios: {
            ramp_up: {
                executor: 'ramping-arrival-rate',
                startRate: 100,
                timeUnit: '1s',
                preAllocatedVUs: 20,
                maxVUs: 1500,
                stages: [
                    { duration: '30s', target: 10 },  // 10명의 사용자로 램프업
                    { duration: '1m', target: 10 },   // 1분간 부하 유지
                    { duration: '30s', target: 0 }    // 점진적으로 부하 감소
                ]
            }
        },
        thresholds: {
            http_req_duration: ['p(95)<200', 'p(99)<500'],
            http_req_failed: ['rate<0.01'],
            'http_reqs{status:200}': ['count>0']
        },
        discardResponseBodies: true,
        noConnectionReuse: false,
        userAgent: 'K6LoadTest/1.0'
    };
    export default function() {
        // 스프링부트 서비스 엔드포인트 URL
        const baseUrl = 'https://handbook.sayaya.cloud';
        const payload = createTypePayload();
        const params = {
            tags: { endpoint: 'types' }
        };

        const getResponse = http.put(`${baseUrl}/types`, JSON.stringify(payload), params);

        // 응답 검증
        check(getResponse, {
            'GET 상태 코드는 204': (r) => r.status === 204,
            'GET 응답 시간 < 500ms': (r) => r.timings.duration < 500
        });
        sleep(0.1);
    }

    export function createTypePayload() {
      const now = new Date();
      const effectDate = new Date(now);
      const expireDate = new Date(now);
      expireDate.setFullYear(expireDate.getFullYear() + 1);  // 1년 후 만료

      return {
            id: `type-${getRandomInt(0, 8)}`,
            version: `${getRandomInt(1, 9)}.${getRandomInt(0, 9)}`,
            effectDateTime: effectDate.toISOString(),
            expireDateTime: expireDate.toISOString(),
            description: `테스트 타입 ${randomString(10)}`,
            primitive: Math.random() > 0.5,
            attributes: createRandomAttributes(getRandomInt(0, 5)),
            parent: Math.random() > 0.7 ? `parent-${getRandomInt(0, 5)}` : null
        };
    }
    export function createRandomAttributes(count) {
      const attributes = [];
      for (let i = 0; i < count; i++) {
        attributes.push({
          name: `attr-${getRandomInt(5)}`,
          type: `type-${getRandomInt(4)}`,
          required: Math.random() > 0.5
        });
      }
      return attributes;
    }
    export function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // 초기화 함수 - 커넥션 풀 최적화
    export function setup() {
      console.log('부하 테스트 시작: 목표 1000 TPS');
    }

    // 종료 함수 - 결과 요약
    export function teardown() {
      console.log('부하 테스트 완료');
    }
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: persist-test
  namespace: {{ .Release.Namespace }}
spec:
  args:
    - name: prometheus-url
      value: 'https://thanos-querier.openshift-monitoring.svc:9091'
    - name: prometheus-token
      valueFrom:
        secretKeyRef:
          key: token
          name: prometheus
  metrics:
    - name: performance-test
      provider:
        job:
          spec:
            template:
              spec:
                containers:
                  - name: k6
                    image: 'loadimpact/k6:latest'
                    args:
                      - run
                      - /tests/test.js
                      - '--out'
                      - json=/output/result.json
                    env:
                      - name: K6_STATSD_ENABLE_TAGS
                        value: 'true'
                    volumeMounts:
                      - name: test-scripts
                        mountPath: /tests
                      - name: test-output
                        mountPath: /output
                volumes:
                  - name: test-scripts
                    configMap:
                      name: persist-test
                  - name: test-output
                    emptyDir: {}
                restartPolicy: Never
            backoffLimit: 1
    - name: success-rate
      initialDelay: 6m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            sum(irate(http_server_requests_seconds_count{namespace="handbook-test",	app="persist", uri="/types", status=~"2.."}[6m])) /
            sum(irate(http_server_requests_seconds_count{namespace="handbook-test",	app="persist", uri="/types"}[6m])) * 100
      successCondition: result[0] >= 0.99
    - name: 200tps-response-time
      initialDelay: 1m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="persist"
            }[1m])) by (le))
      successCondition: result[0] <= 100
    - name: 500tps-response-time
      initialDelay: 3m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="persist"
            }[1m])) by (le))
      successCondition: result[0] <= 200
    - name: 1000tps-response-time
      initialDelay: 5m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="persist"
            }[1m])) by (le))
      successCondition: result[0] <= 200