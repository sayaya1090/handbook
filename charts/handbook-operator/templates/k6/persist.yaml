kind: ConfigMap
apiVersion: v1
metadata:
  name: persist-test
  namespace: {{ .Release.Namespace }}
immutable: false
data:
  test.js: |-
    import http from 'k6/http';
    import { sleep, check } from 'k6';
    import { randomString } from 'https://jslib.k6.io/k6-utils/1.4.0/index.js';

    export const options = {
        scenarios: {
            ramp_up: {
                executor: 'ramping-arrival-rate',
                startRate: 100,
                timeUnit: '1s',
                preAllocatedVUs: 20,
                maxVUs: 1500,
                stages: [
                    { duration: '1m', target: 200 },    // 1분간 200 TPS로 시작
                    { duration: '2m', target: 500 },    // 2분간 500 TPS로 증가
                    { duration: '2m', target: 1000 },   // 2분간 1000 TPS로 증가
                    { duration: '1m', target: 0 }       // 점진적으로 부하 감소
                ]
            }
        },
        thresholds: {
            http_req_duration: ['p(75)<500', 'p(99)<1000'],
            http_req_failed: ['rate<0.01'],
            'http_reqs{status:200}': ['count>0']
        },
        discardResponseBodies: true,
        noConnectionReuse: false,
        userAgent: 'K6LoadTest/1.0'
    };
    export default function() {
        // 스프링부트 서비스 엔드포인트 URL
        const baseUrl = 'https://handbook.sayaya.cloud';
        const payload = createTypePayload();
        const workspace = generateUUID();
        const params = {
            headers: {
                'Content-Type': 'application/json'
            }, tags: { endpoint: 'types' }
        };

        const getResponse = http.put(`${baseUrl}/workspace/${workspace}/types`, JSON.stringify(payload), params);

        // 응답 검증
        check(getResponse, {
            'GET 상태 코드는 200': (r) => r.status === 200,
            'GET 응답 시간 < 500ms': (r) => r.timings.duration < 500
        });
        sleep(0.1);
    }
    export function generateUUID() {
      // 랜덤 16진수 문자열 생성
      function s4() {
        return Math.floor((1 + Math.random()) * 0x10000).toString(16).substring(1);
      }
      // 8-4-4-4-12 형태로 UUID 조합
      return s4() + s4() + '-' + s4() + '-' + s4() + '-' + s4() + '-' + s4() + s4() + s4();
    }

    export function createTypePayload() {
        const now = new Date();
        const effectDate = new Date(now);
        const expireDate = new Date(now);
        expireDate.setTime(effectDate.getTime() + 10);
        const uuid = randomString(36)
        const id = getRandomInt(1, 100)

        return {
            id: `type-${id}`,
            version: `${uuid}`,
            effectDateTime: effectDate.toISOString(),
            expireDateTime: expireDate.toISOString(),
            description: `테스트 타입 ${uuid}`,
            primitive: Math.random() > 0.5,
            attributes: [],
            parent: null
        };
    }
    export function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // 초기화 함수 - 커넥션 풀 최적화
    export function setup() {
      console.log('부하 테스트 시작: 목표 1000 TPS');
    }

    // 종료 함수 - 결과 요약
    export function teardown() {
      console.log('부하 테스트 완료');
    }
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: persist-test
  namespace: {{ .Release.Namespace }}
spec:
  args:
    - name: prometheus-url
      value: 'https://thanos-querier.openshift-monitoring.svc:9091'
    - name: prometheus-token
      valueFrom:
        secretKeyRef:
          key: token
          name: prometheus
  metrics:
    - name: persist-performance
      initialDelay: 8m
      provider:
        job:
          spec:
            template:
              spec:
                containers:
                  - name: k6
                    image: 'loadimpact/k6:latest'
                    args:
                      - run
                      - /tests/test.js
                      - '--out'
                      - json=/output/result.json
                    env:
                      - name: K6_STATSD_ENABLE_TAGS
                        value: 'true'
                    volumeMounts:
                      - name: test-scripts
                        mountPath: /tests
                      - name: test-output
                        mountPath: /output
                volumes:
                  - name: test-scripts
                    configMap:
                      name: persist-test
                  - name: test-output
                    emptyDir: {}
                restartPolicy: Never
            backoffLimit: 1
    - name: persist-success-rate
      initialDelay: 14m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            sum(irate(http_server_requests_seconds_count{namespace="handbook-test", app="persist", uri="/types", status=~"2.."}[6m])) /
            sum(irate(http_server_requests_seconds_count{namespace="handbook-test", app="persist", uri="/types"}[6m])) * 100
      successCondition: result[0] >= 0.99
    - name: persist-200tps-response-time
      initialDelay: 9m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="persist"
            }[1m])) by (le))
      successCondition: result[0] <= 100
    - name: persist-500tps-response-time
      initialDelay: 11m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="persist"
            }[1m])) by (le))
      successCondition: result[0] <= 500
    - name: persist-1000tps-response-time
      initialDelay: 13m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="persist"
            }[1m])) by (le))
      successCondition: result[0] <= 1000