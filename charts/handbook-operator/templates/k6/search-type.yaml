apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: search-type-test
  namespace: {{ .Release.Namespace }}
spec:
  args:
    - name: prometheus-url
      value: 'https://thanos-querier.openshift-monitoring.svc:9091'
    - name: prometheus-token
      valueFrom:
        secretKeyRef:
          key: token
          name: prometheus
  metrics:
    - name: search-type-performance
      provider:
        job:
          spec:
            template:
              spec:
                containers:
                  - name: k6
                    image: 'loadimpact/k6:latest'
                    args:
                      - run
                      - /tests/test.js
                      - '--out'
                      - json=/output/result.json
                    env:
                      - name: K6_STATSD_ENABLE_TAGS
                        value: 'true'
                    volumeMounts:
                      - name: test-scripts
                        mountPath: /tests
                      - name: test-output
                        mountPath: /output
                volumes:
                  - name: test-scripts
                    configMap:
                      name: search-type-test
                  - name: test-output
                    emptyDir: {}
                restartPolicy: Never
            backoffLimit: 1
    - name: search-type-success-rate
      initialDelay: 7m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            sum(irate(http_server_requests_seconds_count{namespace="handbook-test", app="search-type", uri="/types", status=~"2.."}[6m])) /
            sum(irate(http_server_requests_seconds_count{namespace="handbook-test", app="search-type", uri="/types"}[6m])) * 100
      successCondition: result[0] >= 0.99
    - name: search-type-200tps-response-time
      initialDelay: 2m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="search-type"
            }[1m])) by (le))
      successCondition: result[0] <= 500
    - name: search-type-500tps-response-time
      initialDelay: 4m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="search-type"
            }[1m])) by (le))
      successCondition: result[0] <= 500
    - name: search-type-1000tps-response-time
      initialDelay: 6m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="search-type"
            }[1m])) by (le))
      successCondition: result[0] <= 500
    - name: search-type-2000tps-response-time
      initialDelay: 8m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="search-type"
            }[1m])) by (le))
      successCondition: result[0] <= 500
