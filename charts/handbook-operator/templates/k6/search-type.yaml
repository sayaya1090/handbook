kind: ConfigMap
apiVersion: v1
metadata:
  name: search-type-test
  namespace: {{ .Release.Namespace }}
immutable: false
data:
  test.js: |-
    import http from 'k6/http';
    import { sleep, check } from 'k6';

    export const options = {
        scenarios: {
            ramp_up: {
                executor: 'ramping-arrival-rate',
                startRate: 100,
                timeUnit: '1s',
                preAllocatedVUs: 20,
                maxVUs: 500,
                stages: [
                    { duration: '1m', target: 200 },    // 1분간 200 TPS로 시작
                    { duration: '2m', target: 500 },    // 2분간 500 TPS로 증가
                    { duration: '2m', target: 1000 },   // 2분간 1000 TPS로 증가
                    { duration: '2m', target: 2000 },   // 2분간 2000 TPS로 증가
                    { duration: '2m', target: 2000 },   // 2분간 2000 TPS 유지
                    { duration: '1m', target: 0 }       // 1분간 점진적으로 감소
                ]
            }
        },
        thresholds: {
            http_req_duration: ['p(95)<500', 'p(99)<1000'],
            http_req_failed: ['rate<0.01'],
            'http_reqs{status:204}': ['count>0']
        },
        discardResponseBodies: true,
        noConnectionReuse: false,
        userAgent: 'K6LoadTest/1.0'
    };
    export default function() {
        // 스프링부트 서비스 엔드포인트 URL
        const baseUrl = 'https://handbook.sayaya.cloud';
        const params = {
            tags: { endpoint: 'types' }
        };

        // GET 요청 테스트 - 페이지/limit 값 무작위화 (캐싱 회피)
        const page = getRandomInt(0, 10);
        const limit = getRandomInt(10, 100);
        const getResponse = http.get(`${baseUrl}/types?page=${page}&limit=${limit}`, params);

        // 응답 검증
        check(getResponse, {
            'GET 상태 코드는 204': (r) => r.status === 204,
            'GET 응답 시간 < 500ms': (r) => r.timings.duration < 500
        });
        sleep(0.1);
    }

    export function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    // 초기화 함수 - 커넥션 풀 최적화
    export function setup() {
        console.log('부하 테스트 시작: 목표 1000 TPS');
    }

    // 종료 함수 - 결과 요약
    export function teardown() {
        console.log('부하 테스트 완료');
    }
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: search-type-test
  namespace: {{ .Release.Namespace }}
spec:
  args:
    - name: prometheus-url
      value: 'https://thanos-querier.openshift-monitoring.svc:9091'
    - name: prometheus-token
      valueFrom:
        secretKeyRef:
          key: token
          name: prometheus
  metrics:
    - name: performance-test
      provider:
        job:
          spec:
            template:
              spec:
                containers:
                  - name: k6
                    image: 'loadimpact/k6:latest'
                    args:
                      - run
                      - /tests/test.js
                      - '--out'
                      - json=/output/result.json
                    env:
                      - name: K6_STATSD_ENABLE_TAGS
                        value: 'true'
                    volumeMounts:
                      - name: test-scripts
                        mountPath: /tests
                      - name: test-output
                        mountPath: /output
                volumes:
                  - name: test-scripts
                    configMap:
                      name: search-type-test
                  - name: test-output
                    emptyDir: {}
                restartPolicy: Never
            backoffLimit: 1
    - name: success-rate
      initialDelay: 10m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            sum(irate(http_server_requests_seconds_count{namespace="handbook-test",	app="search-type", uri="/types", status=~"2.."}[10m])) /
            sum(irate(http_server_requests_seconds_count{namespace="handbook-test",	app="search-type", uri="/types"}[10m])) * 100
      successCondition: result[0] >= 0.99
    - name: 200tps-response-time
      initialDelay: 1m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="search-type"
            }[1m])) by (le))
      successCondition: result[0] <= 100
    - name: 500tps-response-time
      initialDelay: 3m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="search-type"
            }[1m])) by (le))
      successCondition: result[0] <= 200
    - name: 1000tps-response-time
      initialDelay: 5m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="search-type"
            }[1m])) by (le))
      successCondition: result[0] <= 300
    - name: 2000tps-response-time
      initialDelay: 9m
      provider:
        prometheus:
          address: {{ `'{{ args.prometheus-url }}'` }}
          headers:
            - key: Authorization
              value: Bearer {{ `{{ args.prometheus-token }}` }}
          insecure: true
          query: >
            histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{
              reporter="destination",
              destination_workload_namespace="handbook-test",
              destination_app="search-type"
            }[1m])) by (le))
      successCondition: result[0] <= 700
