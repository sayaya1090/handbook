    export default function() {
        // 스프링부트 서비스 엔드포인트 URL
        const baseUrl = 'https://handbook.sayaya.cloud';
        const randomIndex = Math.floor(Math.random() * workspaces.length);
        const workspace = workspaces[randomIndex];
        const params = {
            tags: { endpoint: 'types' }
        };

        // GET 요청 테스트 - 페이지/limit 값 무작위화 (캐싱 회피)
        const page = getRandomInt(0, 10);
        const limit = getRandomInt(1, 10);
        const getResponse = http.get(`${baseUrl}/workspace/${workspace}/types?page=${page}&limit=${limit}`, params);

        // 응답 검증
        check(getResponse, {
            'GET 상태 코드는 2xx': (r) => r.status >= 200 && r.status < 300,
            'GET 응답 시간 < 500ms': (r) => r.timings.duration < 500
        });
        sleep(0.1);
    }
    export function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    // 초기화 함수 - 커넥션 풀 최적화
    export function setup() {
        console.log('부하 테스트 시작: 목표 1000 TPS');
    }

    // 종료 함수 - 결과 요약
    export function teardown() {
        console.log('부하 테스트 완료');
    }
