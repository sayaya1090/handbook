apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.host }}-ca
  namespace: istio-system
spec:
  commonName: {{ .Values.host }}
  dnsNames:
    - {{ .Values.host }}
    - '*.{{ .Values.host }}'
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
  secretName: {{ .Values.host }}-ca